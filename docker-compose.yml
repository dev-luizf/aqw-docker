x-game-config: &game-config
  SITE_NAME: ${SITE_NAME:-Armagedom Worlds}
  SERVER_NAME: ${SERVER_NAME:-Armagedom}
  PUBLIC_GAME_IP: ${PUBLIC_GAME_IP:-127.0.0.1}
  GAME_PORT: ${GAME_PORT:-5588}
  GAME_LOADER: ${GAME_LOADER:-/gamefiles/loaders/Loader_Spider.swf}
  GAME_CLIENT_SWF: ${GAME_CLIENT_SWF:-spider.swf}
  GAME_CLIENT_TITLE: ${GAME_CLIENT_TITLE:-Armagedom Worlds}
  GAME_CLIENT_BG: ${GAME_CLIENT_BG:-Back.swf}
  GAME_CLIENT_VERSION: ${GAME_CLIENT_VERSION:-ARM001}
  GAME_VERSION_STATUS: ${GAME_VERSION_STATUS:-success}
  GAME_MENU: ${GAME_MENU-}
  GAME_ASSETS: ${GAME_ASSETS:-AWAssets.swf}
  GAME_NEWS: ${GAME_NEWS-}
  GAME_MAP: ${GAME_MAP:-news/Map-UI_r38.swf}
  GAME_BOOK: ${GAME_BOOK:-news/spiderbook3.swf}
  GAME_FBC: ${GAME_FBC:-FBC-2011-03-08.swf}
  GAME_NEW_USER: ${GAME_NEW_USER:-newuser/AW-Registration.swf}
  GAME_MAX_BAG_SLOTS: ${GAME_MAX_BAG_SLOTS:-500}
  GAME_MAX_BANK_SLOTS: ${GAME_MAX_BANK_SLOTS:-900}
  GAME_MAX_HOUSE_SLOTS: ${GAME_MAX_HOUSE_SLOTS:-300}
  GAME_MAX_GUILD_MEMBERS: ${GAME_MAX_GUILD_MEMBERS:-800}
  GAME_MAX_FRIENDS: ${GAME_MAX_FRIENDS:-300}
  GAME_MAX_LOADOUT_SLOTS: ${GAME_MAX_LOADOUT_SLOTS:-50}
  GAME_SERVER_MAX_PLAYERS: ${GAME_SERVER_MAX_PLAYERS:-900}
  GAME_SERVER_CHAT_MODE: ${GAME_SERVER_CHAT_MODE:-2}
  GAME_SERVER_UPGRADE_ONLY: ${GAME_SERVER_UPGRADE_ONLY:-0}
  GAME_SERVER_MOTD: ${GAME_SERVER_MOTD:-Welcome to Armagedom!}

x-database-config: &database-config
  MYSQL_HOST: db
  MYSQL_PORT: ${MYSQL_PORT:-3306}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-mextv3}
  MYSQL_USER: ${MYSQL_USER:-aqw}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}

x-portal-config: &portal-config
  <<: [*game-config, *database-config]
  APP_ENV: ${APP_ENV:-development}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
  BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:8081}
  APP_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:8081}
  DEV_LOG_AUTH_LINKS: ${DEV_LOG_AUTH_LINKS:-false}
  SMTP_HOST: ${SMTP_HOST-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER-}
  SMTP_PASSWORD: ${SMTP_PASSWORD-}
  MAIL_FROM: ${MAIL_FROM:-Armagedom Worlds <no-reply@localhost>}
  SOCKET_PROXY_PORT: ${PROXY_PORT_HOST:-9001}
  SOCKET_PROXY_URL: ${SOCKET_PROXY_URL-}

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mextv3}
      MYSQL_USER: ${MYSQL_USER:-aqw}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - armagedom-db:/var/lib/mysql
      - ./docker/db/01-mextv3.sql:/docker-entrypoint-initdb.d/01-mextv3.sql:ro
      - ./docker/db/02-bootstrap.sql:/docker-entrypoint-initdb.d/02-bootstrap.sql:ro
      - ./docker/db/03-battleon-map.sql:/docker-entrypoint-initdb.d/03-battleon-map.sql:ro
    command:
      - --character-set-server=latin1
      - --collation-server=latin1_swedish_ci
      - --sql-mode=
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *database-config

  game:
    build:
      context: .
      dockerfile: docker/game/Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: [*game-config, *database-config]
      SFS_ADMIN_USER: ${SFS_ADMIN_USER:-dolphin}
      SFS_ADMIN_PASSWORD: ${SFS_ADMIN_PASSWORD:?Set SFS_ADMIN_PASSWORD in .env}
      SFS_ADMIN_ALLOWED_ADDRESS: ${SFS_ADMIN_ALLOWED_ADDRESS:-127.0.0.1}
      JAVA_XMS: ${JAVA_XMS:-128m}
      JAVA_XMX: ${JAVA_XMX:-768m}
    expose:
      - "${GAME_PORT:-5588}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/${GAME_PORT:-5588}'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: runner
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *portal-config
    ports:
      - "${WEB_PORT_HOST:-8081}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  proxy:
    build:
      context: ./docker/proxy
    restart: unless-stopped
    depends_on:
      game:
        condition: service_healthy
    environment:
      GAME_HOST: ${AQW_GAME_HOST:-game}
      GAME_PORT: ${GAME_PORT:-5588}
      PROXY_LISTEN: ${PROXY_LISTEN:-:9001}
    ports:
      - "127.0.0.1:${PROXY_PORT_HOST:-9001}:9001"
    healthcheck:
      test: ["CMD", "/usr/local/bin/ruffle-proxy", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  armagedom-db:
