server {
    listen 80;
    server_name _;
    client_max_body_size 32m;

    # Docker embedded DNS — re-resolve service names when containers recreate.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Ruffle cannot open raw TCP — bridge WebSocket → SmartFox.
    location = /flash-socket-proxy {
        set $upstream_proxy proxy;
        proxy_pass http://$upstream_proxy:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        set $upstream_web web;
        proxy_pass http://$upstream_web:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffering off;
    }
}
