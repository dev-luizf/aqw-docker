# Server Settings
# Docker regenerates this file from docker/game/AugoEidEs.conf.template on start
# (MYSQL_HOST=db, credentials from .env).
server.staffonly=false
server.name=Armagedom

# Database Settings (defaults match .env for local / non-Docker runs)
database.host=127.0.0.1
database.user=aqw
database.pass=aqw
database.port=3306
database.name=mextv3
database.connections.max=500

# Anti Message Flood
antiflood.message.tolerance=3
antiflood.message.warnings=3
antiflood.message.minimumtime=1000
antiflood.message.maxrepeated=3
antiflood.message.maxsimilar=4
antiflood.request.ipbanlist=bannedip.txt

# Anti Request Flood
antiflood.request.warnings=5
antiflood.request.tolerance=10
antiflood.request.minimumtime=500

# Anti Request Repeat Filter
antiflood.request.enablerepeatfilter=false
antiflood.request.maxrepeated=10

# Anti Request Exceptions
antiflood.request.guarded.1=message
antiflood.request.guarded.2=gar

